<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pseudo-Class Example</title>
    <style>
      /* Define styles for different link states */
      a:link {
        color: green; /* unvisited links */
      }

      a:visited {
        color: purple; /* visited links */
      }

      a:hover {
        color: blue; /* Color when hovering */
      }

      a:active {
        color: red; /* when the link is being clicked */
      }
    </style>
  </head>
  <body>
    <h1>Pseudo-Class Example</h1>
    <p>Check out the following links and see how they change color:</p>

    <ul>
      <li><a href="https://www.amazon.com">Amazon</a></li>
      <li><a href="https://www.google.com">Google</a></li>
      <li><a href="https://www.gmail.com">GMail</a></li>
    </ul>

    <h1>Media Example</h1>

    <!-- Local Video -->
    <h2>Local Video</h2>
    <video width="320" height="240" controls>
      <source src="local_video.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>

    <!-- Autoplay Video -->
    <h2>Autoplay Video</h2>
    <video width="320" height="240" autoplay muted>
      <source src="autoplay_video.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>

    <!-- YouTube Autoplay Video -->
    <h2>YouTube Autoplay Video</h2>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/watch?v=LXb3EKWsInQ&pp=ygUMc2FtcGxlIHZpZGVv"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
    >
    </iframe>

    <!-- Audio -->
    <h2>Audio Example</h2>
    <audio controls>
      <source src="sample_audio.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
  </body>
</html>
